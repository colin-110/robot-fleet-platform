name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ── CI: Backend Lint & Tests ───────────────────────────────────────
  backend-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fleet_test_db
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install dependencies & linters
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black flake8
      - name: Check formatting (Black)
        run: cd backend && black --check app tests || echo "::warning::Black formatting issues (non-blocking)"
      - name: Run Pytest
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fleet_test_db
          REDIS_URL: redis://localhost:6379/0
          TELEMETRY_API_KEY: fleet-secret-key-2026
          USE_REDIS_BUFFER: "false"
          PYTHONPATH: .
        run: cd backend && pytest tests/ -v

  # ── CI: Frontend Lint & Build ──────────────────────────────────────
  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/robot-fleet-dashboard/package-lock.json
      - run: cd frontend/robot-fleet-dashboard && npm ci
      - run: cd frontend/robot-fleet-dashboard && npm run lint
      - run: cd frontend/robot-fleet-dashboard && npm run build

  # ── CD: Build & publish images to GitHub Container Registry ─────────
  # Runs only on pushes to main, after tests pass. Produces deployable,
  # versioned images that any host (EC2, ECS, k8s) can pull — no building
  # on the target box required.
  publish-images:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    needs: [ backend-test, frontend-build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend/robot-fleet-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/robot-fleet-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/robot-fleet-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CD: Deploy to AWS (opt-in) ─────────────────────────────────────
  # Gated so the pipeline stays green until AWS is wired up. To enable:
  #   1. Set repo variable ENABLE_AWS_DEPLOY = true
  #   2. Add an OIDC deploy role and set secret AWS_DEPLOY_ROLE_ARN
  #   3. Ensure the EC2 host is SSM-managed (tag: role=fleet-app)
  # The instance then pulls the freshly published GHCR images and restarts.
  deploy-aws:
    name: Deploy to AWS (EC2 via SSM)
    runs-on: ubuntu-latest
    needs: [ publish-images ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_AWS_DEPLOY == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Roll out new images to the app host
        run: |
          aws ssm send-command \
            --targets "Key=tag:role,Values=fleet-app" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters 'commands=["cd /opt/fleetops && docker compose pull && docker compose up -d"]'
