services:
  backend:
    build: ./backend
    # Reduced to 2 workers to fit safely within the 1GB RAM of a t2.micro
    command: ["sh", "-c", "python prestart.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop --http httptools --no-access-log"]
    ports:
      # Map host port 80 to container port 8000 for direct HTTP access without ALB
      - "80:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - PYTHONPATH=.
    restart: unless-stopped
    networks:
      - fleet_net

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=.
    restart: unless-stopped
    networks:
      - fleet_net

networks:
  fleet_net:
    driver: bridge
