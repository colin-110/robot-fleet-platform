version: "3.9"

services:

  backend:

    build: ./backend

    container_name: fleet_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - db

  frontend:

    build: ./frontend/robot-fleet-dashboard

    container_name: fleet_frontend

    ports:
      - "5173:5173"

    environment:
      - VITE_API_BASE_URL=http://localhost:8000

    depends_on:
      - backend

  db:

    image: postgres:15

    container_name: fleet_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: robotfleet

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: