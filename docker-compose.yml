name: robot-fleet-platform

services:
  backend:
    build: ./backend
    container_name: fleet_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/robotfleet
      - REDIS_URL=redis://redis:6379/0
      - TELEMETRY_API_KEY=fleet-secret-key-2026
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - fleet_net

  worker:
    build: ./backend
    container_name: fleet_worker
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/robotfleet
      - REDIS_URL=redis://redis:6379/0
      - TELEMETRY_API_KEY=fleet-secret-key-2026
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fleet_net

  frontend:
    build: ./frontend/robot-fleet-dashboard
    container_name: fleet_frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fleet_net

  simulator:
    build: ./simulator
    container_name: fleet_simulator
    command: ["python", "-u", "robot_sim.py", "--api-url", "http://backend:8000/api/v1/telemetry", "--api-key", "fleet-secret-key-2026"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fleet_net

  db:
    image: postgres:15
    container_name: fleet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: robotfleet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d robotfleet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fleet_net

  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fleet_net

volumes:
  postgres_data:

networks:
  fleet_net:
    driver: bridge