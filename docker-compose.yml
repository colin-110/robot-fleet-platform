services:

  backend:
    build: ./backend
    command: ["sh", "-c", "python prestart.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http httptools --no-access-log"]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - fleet_net

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('/tmp/worker_healthy') < 30"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - fleet_net


  frontend:
    build: ./frontend/robot-fleet-dashboard
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fleet_net

  simulator:
    build: ./simulator
    command: ["python", "-u", "robot_sim.py", "--api-url", "http://backend:8000/api/v1/telemetry", "--api-key", "${TELEMETRY_API_KEY}"]
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fleet_net

  db:
    image: postgres:15-alpine
    command: postgres -c synchronous_commit=off -c max_connections=200 -c shared_buffers=256MB
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fleet_net

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fleet_net

volumes:
  postgres_data:

networks:
  fleet_net:
    driver: bridge