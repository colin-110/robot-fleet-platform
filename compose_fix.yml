services:
  backend:
    build: ./backend
    command: ["sh", "-c", "python prestart.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --loop uvloop --http httptools --no-access-log"]
    ports:
      - "80:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - PYTHONPATH=.
    restart: unless-stopped
    networks:
      - fleet_net

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=.
    restart: unless-stopped
    networks:
      - fleet_net

  simulator:
    build: ./simulator
    command: ["python", "-u", "robot_sim.py", "--api-url", "http://backend:8000/api/v1/telemetry", "--api-key", "replace-me-in-production", "--robots", "20"]
    restart: unless-stopped
    networks:
      - fleet_net

networks:
  fleet_net:
    driver: bridge